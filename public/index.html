<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <!-- Tints the mobile browser chrome (address/status bar). -->
    <meta name="theme-color" content="#a7c7e7" />
    <title>Everyone else is having a better life than me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Cabin+Sketch:wght@400;700&family=Londrina+Solid:wght@400;900&family=Patrick+Hand&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section>
        <span class="word"
          ><span class="line">Eve</span><span class="line">ryo</span
          ><span class="line">ne</span></span
        >
      </section>
    <section>
      <span class="word"
        ><span class="line">Els</span><span class="line">e</span></span
      >
    </section>
    <section>
      <span class="word"><span class="line">Is</span></span>
    </section>
    <section>
      <span class="word"
        ><span class="line">Hav</span><span class="line">ing</span></span
      >
    </section>
    <section>
      <span class="word"><span class="line">A</span></span>
    </section>
    <section>
      <span class="word"
        ><span class="line">Bet</span><span class="line">ter</span></span
      >
    </section>
    <section>
      <span class="word"
        ><span class="line">Lif</span><span class="line">e</span></span
      >
    </section>
    <section>
      <span class="word"
        ><span class="line">Tha</span><span class="line">n</span></span
      >
    </section>
    <section>
      <span class="word"><span class="line">Me</span></span>
    </section>
    </main>

    <!-- Type playground (dev aid) -->
    <button id="panel-toggle" aria-label="Toggle type controls">⚙</button>
    <aside id="panel" aria-label="Type controls">
      <div class="row">
        <label for="c-font">Font</label>
        <select id="c-font"></select>
      </div>
      <div class="row">
        <label for="c-weight">Weight</label>
        <select id="c-weight">
          <option value="400">Regular</option>
          <option value="700">Bold</option>
          <option value="900">Black</option>
        </select>
      </div>
      <div class="row">
        <label for="c-size">Size</label>
        <input id="c-size" type="range" min="6" max="60" step="0.5" />
        <span class="val" id="v-size"></span>
      </div>
      <div class="row">
        <label for="c-kern">Kerning</label>
        <input id="c-kern" type="range" min="-0.1" max="0.5" step="0.005" />
        <span class="val" id="v-kern"></span>
      </div>
      <div class="row">
        <label for="c-lead">Leading</label>
        <input id="c-lead" type="range" min="0.7" max="2" step="0.01" />
        <span class="val" id="v-lead"></span>
      </div>
      <div class="row">
        <label for="c-stroke">Outline</label>
        <input id="c-stroke" type="range" min="0" max="20" step="0.5" />
        <span class="val" id="v-stroke"></span>
      </div>
      <div class="row">
        <label for="c-pink">Pink</label>
        <input id="c-pink" type="color" />
      </div>
      <div class="row">
        <label for="c-red">Red</label>
        <input id="c-red" type="color" />
      </div>
      <div class="row">
        <label for="c-border-color">Border</label>
        <input id="c-border-color" type="color" />
      </div>
      <div class="row">
        <label for="c-border-w">Border w.</label>
        <input id="c-border-w" type="range" min="0" max="40" step="0.5" />
        <span class="val" id="v-border-w"></span>
      </div>
      <div class="row">
        <label for="c-theme">Chrome</label>
        <input id="c-theme" type="color" />
      </div>
      <div class="actions">
        <button id="c-copy" type="button">Copy CSS</button>
        <button id="c-reset" type="button">Reset</button>
      </div>
    </aside>

    <script src="controls.js"></script>
  </body>
</html>
